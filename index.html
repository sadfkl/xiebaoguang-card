<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的名片</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑", sans-serif; }
        body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 90%;
        }
        h2 { color: #2c3e50; margin-bottom: 15px; text-align: center; }
        p { color: #34495e; margin: 8px 0; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <h2>谢宝光</h2>
        <p>从业类别：一般作业</p>
        <p>有效日期：2025年11月11日 至 2028年11月11日</p>
        <p>联系电话：13xxxxxxxxx</p>
    </div>
</body>
</html>
